services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: subvox
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    restart: unless-stopped

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/subvox
      REDIS_URL: redis://redis:6379/0
      ECONOMY_URL: http://economy:8001
      CORS_ORIGINS: http://localhost:3000,http://localhost:3002
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    ports: ["8000:8000"]
    depends_on: [redis, db]
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: celery -A core.celery_app.celery_app worker -Q short,medium,long,xlong,video_processing --pool=solo -n worker1@%h
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/subvox
      REDIS_URL: redis://redis:6379/0
      ECONOMY_URL: http://economy:8001
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    depends_on: [redis, db]
    restart: unless-stopped

  economy:
    build:
      context: ../economy
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/subvox
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000,http://localhost:3002
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    ports: ["8001:8001"]
    depends_on: [redis, db]
    restart: unless-stopped

volumes:
  pgdata:
